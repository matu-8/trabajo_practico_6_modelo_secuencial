<!doctype html>
<html lang="es">

<head>
    <title>Entrenamiento de Modelo — TensorFlow.js</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Regresión lineal secuencial con TensorFlow.js. Entrena un modelo y realiza predicciones." />

    <!-- Tipografía del proyecto -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Estilos del proyecto -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ── Tarjeta principal ── -->
    <div class="card">

        <!-- Encabezado: nombre, fórmula y subtítulo -->
        <header class="card-header">
            <div class="marca">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#81c3d7" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                TensorFlow.js
            </div>

            <div class="formula">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#81c3d7" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                </svg>
                y = 2x + 1
            </div>

            <p class="subtitulo">Regresión lineal secuencial</p>
        </header>

        <!-- Cuerpo: secciones de entrenamiento y predicción -->
        <main class="card-body">

            <!-- Sección: Entrenar Modelo -->
            <section class="section">

                <h2 class="section-titulo">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="18" y1="20" x2="18" y2="10" />
                        <line x1="12" y1="20" x2="12" y2="4" />
                        <line x1="6" y1="20" x2="6" y2="14" />
                    </svg>
                    Entrenar Modelo
                </h2>

                <!-- Cuadro de mensaje de estado -->
                <div id="estado-entrenamiento" class="estado-msg">
                    <span class="punto-estado" aria-hidden="true"></span>
                    <span id="mensaje-estado">Modelo listo. Presioná "Empezar Entrenamiento".</span>
                </div>

                <!-- Barra de progreso del entrenamiento -->
                <div id="progreso-contenedor" class="progreso-contenedor" role="progressbar" aria-valuemin="0"
                    aria-valuemax="100">
                    <div id="progreso-barra" class="progreso-barra"></div>
                </div>

                <button id="btn-entrenar" class="btn btn-entrenar">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polygon points="5 3 19 12 5 21 5 3" />
                    </svg>
                    Empezar Entrenamiento
                </button>

            </section>

            <!-- Sección: Predecir valor -->
            <section class="section">

                <h2 class="section-titulo">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    Predecir valor
                    <span id="badge-entrenado" class="badge">No entrenado</span>
                </h2>

                <!-- Campo de ingreso del valor a predecir -->
                <div class="input-contenedor">
                    <input id="input-valor" class="input-numero" type="number" placeholder="Ingresá un número (ej: 10)"
                        value="4" min="-1000" max="1000" step="1" />
                </div>

                <button id="btn-predecir" class="btn btn-predecir" disabled>
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
                        stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M12 20h9" />
                        <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z" />
                    </svg>
                    Predecir
                </button>

                <!-- Caja de resultado -->
                <div class="resultado-caja">
                    <p class="resultado-etiqueta">📊 Resultado de la predicción</p>
                    <div id="resultado-valor" class="resultado-valor sin-resultado">— — —</div>
                    <p id="resultado-formula" class="resultado-formula">y = peso * x + sesgo</p>
                </div>

            </section>

        </main>

        <!-- Pie: información técnica del modelo -->
        <footer class="card-footer">
            Modelo secuencial Dense(1) &nbsp;|&nbsp;
        </footer>

    </div><!-- /card -->


    <!-- ── Scripts ── -->
    <!-- Orden obligatorio: TensorFlow → main.js → index.js -->

    <!-- 1. Librería TensorFlow.js (debe cargar primero) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>

    <!-- 2. Lógica del modelo (define entrenarModelo, predecir, etc.) -->
    <script src="main.js"></script>

    <!-- 3. Montaje de la página y eventos (usa lo definido en main.js) -->
    <script src="index.js"></script>

</body>

</html>
